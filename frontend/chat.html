<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpdesk Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; color: #333; }
  #status { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; }
  #status.error { background: #ffebee; color: #c62828; }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1976d2; color: #fff; border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .msg.error { align-self: center; background: #ffebee; color: #c62828; font-size: 13px; }
  .msg.tool-call { align-self: center; background: #f3e5f5; color: #7b1fa2; font-size: 12px; max-width: 90%; font-family: monospace; }
  .typing { align-self: flex-start; background: #fff; color: #999; border-radius: 12px; padding: 12px 16px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .typing::after { content: "..."; animation: dots 1.5s steps(3) infinite; }
  @keyframes dots { 50% { content: ".."; } 100% { content: "..."; } }
  #input-area { background: #fff; border-top: 1px solid #e0e0e0; padding: 16px 24px; display: flex; gap: 8px; }
  #input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; resize: none; font-family: inherit; }
  #input:focus { border-color: #1976d2; }
  #send { background: #1976d2; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 500; }
  #send:disabled { background: #bbb; cursor: not-allowed; }
  #send:hover:not(:disabled) { background: #1565c0; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 14px; gap: 8px; }
  .empty-state svg { width: 48px; height: 48px; stroke: #ccc; }
</style>
</head>
<body>
<header>
  <h1>Helpdesk Agent</h1>
  <span id="status">● 检查中...</span>
</header>

<div id="chat">
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span>发送消息开始测试客服助手</span>
  </div>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send" onclick="send()">发送</button>
</div>

<script>
const sessionId = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
let loading = false;
let currentAgentMsg = null;

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || loading) return;

  input.value = "";
  autoResize(input);
  appendMsg(text, "user");
  hideEmpty();
  loading = true;
  setLoading(true);
  currentAgentMsg = null;

  const typingEl = appendTyping();
  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") continue;
        // Accumulate all non-JSON text into one agent bubble
        if (data.startsWith("{")) {
          try { JSON.parse(data); } catch {}
          // skip tool call JSON — internal to agent
        } else {
          if (!currentAgentMsg) {
            currentAgentMsg = appendMsg("", "agent");
          }
          currentAgentMsg.textContent += data;
          currentAgentMsg.scrollIntoView({ behavior: "smooth" });
        }
      }
    }
  } catch (err) {
    appendMsg("请求失败: " + err.message, "error");
  } finally {
    typingEl.remove();
    loading = false;
    setLoading(false);
    currentAgentMsg = null;
  }
}

function appendMsg(text, cls) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  el.textContent = text;
  document.getElementById("chat").appendChild(el);
  el.scrollIntoView({ behavior: "smooth" });
  return el;
}

function appendTyping() {
  const el = document.createElement("div");
  el.className = "typing";
  el.textContent = "思考中";
  document.getElementById("chat").appendChild(el);
  el.scrollIntoView({ behavior: "smooth" });
  return el;
}

function hideEmpty() {
  const es = document.getElementById("empty-state");
  if (es) es.remove();
}

function setLoading(v) {
  document.getElementById("send").disabled = v;
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

document.getElementById("input").addEventListener("input", function() { autoResize(this); });

(async function healthLoop() {
  while (true) {
    try {
      const r = await fetch("/health");
      const j = await r.json();
      const el = document.getElementById("status");
      const parts = [];
      if (j.qdrant === "ok") parts.push("Qdrant OK");
      else parts.push("Qdrant: " + j.qdrant);
      if (j.ollama === "ok") parts.push("Ollama OK");
      else parts.push("Ollama: " + j.ollama);
      el.textContent = "● " + parts.join(" · ");
      el.className = j.qdrant === "ok" && j.ollama === "ok" ? "" : "error";
    } catch {}
    await new Promise(r => setTimeout(r, 10000));
  }
})();
</script>
</body>
</html>
